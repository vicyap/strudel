app = 'strudelai'
primary_region = 'lax'
swap_size_mb = 4096

[build]
  dockerfile = 'fly/Dockerfile'
  [build.args]
    SITE_URL = 'https://strudelai.fly.dev'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '256mb'
